<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Admin Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

<div class="container py-4">

    <div class="d-flex justify-content-between mb-3">
        <a class="btn btn-primary" href="{% url 'admin_summary' %}?year={{ prev_year }}&month={{ prev_month }}">← Previous</a>
        <h3>Admin Summary — {{ month_name }} {{ year }}</h3>
        <a class="btn btn-primary" href="{% url 'admin_summary' %}?year={{ next_year }}&month={{ next_month }}">Next →</a>
    </div>

    <a class="btn btn-outline-secondary mb-3" href="{% url 'calendar' %}">← Calendrier</a>

    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-light">
                <tr>
                    <th>Utilisateur</th>
                    {% for d in days %}<th>{{ d }}</th>{% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <th>{{ row.username }}</th>
                    {% for cell in row.cells %}<td>{{ cell }}</td>{% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
