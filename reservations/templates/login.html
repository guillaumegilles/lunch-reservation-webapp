{% extends 'base.html' %}

{% block title %}Connexion - Lunch Reservation{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-body text-center">
                <h3 class="mb-4">Connexion</h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 text-start">
                        <label class="form-label">Identifiant (3e lettre du nom)</label>
                        <input class="form-control" name="identifier" maxlength="1" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Numero de badge</label>
                        <input class="form-control" type="password" name="badge_number" required>
                    </div>
                    <button class="btn btn-primary w-100">Se connecter</button>
                </form>
                <div class="mt-3">
                    <a href="{% url 'register' %}">Creer un compte</a>
                    &nbsp;|&nbsp;
                    <a href="{% url 'index' %}">Retour</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
